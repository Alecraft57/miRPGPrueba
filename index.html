<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Interactivo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="game-container">
        <h2 id="player-name">Cargando...</h2>

        <div class="stat-card">
            <span>❤️ Vida</span>
            <div class="bar-container"><div id="hp-bar" class="bar"></div></div>
            <span id="hp-text">0/100</span>
        </div>

        <div class="stat-card">
            <span>⚡ Energía</span>
            <div class="bar-container"><div id="en-bar" class="bar"></div></div>
            <span id="en-text">0/100</span>
        </div>

        <div class="gold-display">💰 Oro: <span id="oro-val">0</span></div>

        <div class="actions">
            <button id="btn-explorar-visual" class="btn-main">🌲 Explorar Bosque</button>
            <div class="row">
                <button id="btn-tienda-visual" class="btn-shop">🏪 Tienda</button>
                <button id="btn-mochila-visual" class="btn-bag">🎒 Mochila</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
