<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RPG MiniApp</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="game-container">
        <h2 id="player-name">Cargando...</h2>
        <div class="stat-card">
            <div class="label">❤️ Vida</div>
            <div class="bar-container"><div id="hp-bar" class="bar hp"></div></div>
            <div id="hp-text" class="text-val">0/100</div>
        </div>
        <div class="stat-card">
            <div class="label">⚡ Energía</div>
            <div class="bar-container"><div id="en-bar" class="bar en"></div></div>
            <div id="en-text" class="text-val">0/100</div>
        </div>
        <div class="gold-card">💰 Oro: <span id="oro-val">0</span></div>
        <div class="actions">
            <button id="btn-explorar" class="btn primary">🌲 Explorar Bosque</button>
            <div class="btn-group">
                <button id="btn-tienda" class="btn shop">🏪 Tienda</button>
                <button id="btn-mochila" class="btn bag">🎒 Mochila</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
